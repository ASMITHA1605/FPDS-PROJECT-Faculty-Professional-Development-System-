<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPDS — My Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="layout">

  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">🎓 FPDS</div>
      <div class="brand-tagline">Faculty Development System</div>
    </div>
    <div class="sidebar-section">Main</div>
    <a href="dashboard.html"><span class="nav-icon">🏠</span> Dashboard & Tracker</a>
    <a href="activity.html"><span class="nav-icon">➕</span> Add Activity</a>
    <a href="activity-list.html"><span class="nav-icon">📋</span> Activity History</a>
    <div class="sidebar-section">Account</div>
    <a href="profile.html" class="active"><span class="nav-icon">👤</span> My Profile</a>
    <a href="report.html"><span class="nav-icon">📊</span> Reports</a>
    <div class="sidebar-footer">
      <a href="index.html"><span class="nav-icon">🚪</span> Logout</a>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <div>
        <h1>My Profile</h1>
        <div class="header-sub">Manage your personal information</div>
      </div>
    </div>
    <div class="page-body">

      <div class="form-section">
        <div class="form-section-header">
          <div class="profile-avatar" id="profileAvatar">👤</div>
          <h2>Profile Information</h2>
        </div>
        <div class="form-section-body">

          <div class="form-row">
            <div class="field-group">
              <label>Full Name</label>
              <input type="text" id="profileNameInput" placeholder="e.g. Dr. Priya Sharma">
            </div>
            <div class="field-group">
              <label>Department</label>
              <input type="text" id="profileDeptInput" placeholder="e.g. Computer Science">
            </div>
          </div>

          <div class="form-row">
            <div class="field-group">
              <label>Experience (Years)</label>
              <input type="number" id="profileExpInput" placeholder="e.g. 3">
            </div>
            <div class="field-group">
              <label>Designation</label>
              <input type="text" id="profileDesigInput" placeholder="e.g. Assistant Professor">
            </div>
          </div>

          <div class="form-row full">
            <div class="field-group">
              <label>Phone Number</label>
              <input type="text" id="profilePhoneInput" placeholder="e.g. +91 98765 43210">
            </div>
          </div>

          <div class="form-actions">
            <button class="btn btn-primary" onclick="saveProfile()">💾 Save Profile</button>
            <a href="dashboard.html" class="btn btn-outline">← Back</a>
          </div>

        </div>
      </div>

    </div>
  </div>

</div>
<div id="toast"></div>
<script src="js/script.js"></script>
</body>
</html>
