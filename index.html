<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPDS — Login</title>
  <meta name="description" content="Faculty Professional Development System — Login Portal">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">

  <div class="login-container">

    <div class="login-left">
      <div class="brand-icon">🎓</div>
      <h1>FPDS</h1>
      <div class="brand-sub">Faculty Development</div>
      <p>Track your professional growth, workshops, conferences, FDP programs and publications — all in one place.</p>
      <div class="features">
        <div class="feature-item"><span>📊</span><span>Performance Analytics</span></div>
        <div class="feature-item"><span>🏆</span><span>Faculty Leaderboard</span></div>
        <div class="feature-item"><span>📈</span><span>Improvement Tracker</span></div>
        <div class="feature-item"><span>📋</span><span>Detailed Reports</span></div>
      </div>
    </div>

    <div class="login-box">
      <h2>Welcome Back</h2>
      <p class="login-subtitle">Sign in to your account to continue</p>

      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option value="faculty">Faculty</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your name">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>

      <button onclick="login()">Sign In →</button>
    </div>

  </div>

  <div id="toast"></div>
  <script src="js/script.js"></script>
</body>
</html>
