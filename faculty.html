<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPDS — Faculty Management</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="layout">

  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">🎓 FPDS</div>
      <div class="brand-tagline">Admin Panel</div>
    </div>
    <div class="sidebar-section">Admin</div>
    <a href="faculty.html" class="active"><span class="nav-icon">👥</span> Faculty</a>
    <a href="report.html"><span class="nav-icon">📊</span> Reports</a>
    <div class="sidebar-footer">
      <a href="index.html"><span class="nav-icon">🚪</span> Logout</a>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <div>
        <h1>Faculty Management</h1>
        <div class="header-sub">Add, view and manage faculty accounts</div>
      </div>
    </div>
    <div class="page-body">

      <div class="admin-grid">

        <!-- Faculty Table -->
        <div class="table-card">
          <div class="table-card-header">
            <h2>All Faculty</h2>
            <input class="search-input" id="facultySearch" placeholder="🔍 Search..." oninput="filterFacultyTable()">
          </div>
          <table class="data-table" id="facultyTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Department</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="facultyBody"></tbody>
          </table>
          <div id="facultyEmpty" class="empty-state" style="display:none">
            <div class="empty-icon">👥</div>
            <p>No faculty records found.</p>
          </div>
        </div>

        <!-- Add Faculty Form -->
        <div class="form-section">
          <div class="form-section-header">
            <h2>Add Faculty Account</h2>
          </div>
          <div class="form-section-body">
            <div class="form-row full">
              <div class="field-group">
                <label>Full Name</label>
                <input type="text" id="newFacultyName" placeholder="e.g. Dr. Priya Sharma">
              </div>
            </div>
            <div class="form-row full">
              <div class="field-group">
                <label>Department</label>
                <input type="text" id="newFacultyDept" placeholder="e.g. Computer Science">
              </div>
            </div>
            <div class="form-row full">
              <div class="field-group">
                <label>Password</label>
                <input type="password" id="newFacultyPass" placeholder="Set a password">
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" onclick="addFacultyAccount()">➕ Add Faculty</button>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>

</div>
<div id="toast"></div>
<script src="js/script.js"></script>
</body>
</html>
